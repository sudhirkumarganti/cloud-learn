services:
  cloudsim:
    build:
      context: ./cloudsim-backbone
    ports:
      - "9010:9010"
    environment:
      CLOUDLEARN_CLOUDSIM_HOST: 0.0.0.0
      CLOUDLEARN_CLOUDSIM_PORT: 9010
      CLOUDLEARN_CLOUDSIM_STATE_FILE: /data/cloudsim_state.json
    volumes:
      - cloudsim-data:/data
    restart: unless-stopped

  cloudlearn-sql-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudlearn
    ports:
      - "5432:5432"
    volumes:
      - cloudlearn-sql-pg:/var/lib/postgresql/data
    restart: unless-stopped

  cloudlearn-sql-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudlearn
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - cloudlearn-sql-mysql:/var/lib/mysql
    restart: unless-stopped

  cloudlearn-gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/data"]
    ports:
      - "4443:4443"
    volumes:
      - cloudlearn-gcs:/data
    restart: unless-stopped

  # P1: official Google emulators — let real gRPC client libraries (Pub/Sub,
  # Firestore) work by pointing PUBSUB_EMULATOR_HOST / FIRESTORE_EMULATOR_HOST
  # at these; the simulator delegates its console/REST handlers to them too.
  cloudlearn-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","pubsub","start","--host-port=0.0.0.0:8085","--project=cloudlearn"]
    ports:
      - "8085:8085"
    restart: unless-stopped

  cloudlearn-firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud","beta","emulators","firestore","start","--host-port=0.0.0.0:8080","--project=cloudlearn"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  simulator:
    build: .
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloudlearn-sql-postgres
      - cloudlearn-sql-mysql
      - cloudlearn-gcs
      - cloudlearn-pubsub
      - cloudlearn-firestore
    environment:
      CLOUDLEARN_STATE_FILE: /data/cloudlearn_state.sqlite3
      CLOUDLEARN_LICENSE_SECRET: cloudlearn-dev-secret
      CLOUDLEARN_CLOUDSIM_URL: http://cloudsim:9010
      CLOUDLEARN_DISTRIBUTION_MODE: appliance
      CLOUDLEARN_DEPLOY_DIR: /var/lib/cloudlearn/deployments
      CLOUDLEARN_HOST_SIZING_FILE: /config/cloudlearn-host-sizing.json
      CLOUDLEARN_RUNTIME_BRIDGE_URL: http://host.docker.internal:9171
      # Real Cloud SQL data plane (P1a): provision DBs on these engines.
      CLOUDLEARN_SQL_PG_HOST: cloudlearn-sql-postgres
      CLOUDLEARN_SQL_PG_PORT: "5432"
      CLOUDLEARN_SQL_PG_ADMIN_USER: postgres
      CLOUDLEARN_SQL_PG_ADMIN_PASSWORD: cloudlearn
      CLOUDLEARN_SQL_MYSQL_HOST: cloudlearn-sql-mysql
      CLOUDLEARN_SQL_MYSQL_PORT: "3306"
      CLOUDLEARN_SQL_MYSQL_ADMIN_USER: root
      CLOUDLEARN_SQL_MYSQL_ADMIN_PASSWORD: cloudlearn
      # Real Cloud Storage data plane (P1b): object bytes live in fake-gcs-server.
      CLOUDLEARN_GCS_URL: http://cloudlearn-gcs:4443
      # P1: official Pub/Sub + Firestore emulators back the gRPC data planes.
      PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
      CLOUDLEARN_PUBSUB_EMULATOR_HOST: cloudlearn-pubsub:8085
      CLOUDLEARN_FIRESTORE_EMULATOR_HOST: cloudlearn-firestore:8080
    volumes:
      - cloudlearn-data:/data
      - /var/lib/cloudlearn/deployments:/var/lib/cloudlearn/deployments
      - /var/lib/cloudlearn/host-sizing-report.json:/config/cloudlearn-host-sizing.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:9000/healthz').read().decode())"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  cloudlearn-data:
  cloudsim-data:
  cloudlearn-sql-pg:
  cloudlearn-sql-mysql:
  cloudlearn-gcs:
